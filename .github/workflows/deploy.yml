name: Deploy to Cloudron

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: zip, pdo_mysql, intl, bcmath, gd

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare deployment
        run: |
          mkdir /tmp/deploy

          # Copy backend
          rsync -a backend/ /tmp/deploy/ \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='tests' \
            --exclude='phpunit.xml'

          # Instalar dependencias PHP
          cd /tmp/deploy
          composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=php
          cd -

          # Copiar frontend build al public
          cp -r frontend/dist/* /tmp/deploy/public/
          mv /tmp/deploy/public/index.html /tmp/deploy/public/app.html

          # Copiar start script
          cp start.sh /tmp/deploy/

          # Crear estructura de storage
          mkdir -p /tmp/deploy/storage/app/public
          mkdir -p /tmp/deploy/storage/framework/cache/data
          mkdir -p /tmp/deploy/storage/framework/sessions
          mkdir -p /tmp/deploy/storage/framework/views
          mkdir -p /tmp/deploy/storage/logs
          mkdir -p /tmp/deploy/bootstrap/cache

          # Reemplazar workspace con el build listo
          find $GITHUB_WORKSPACE -mindepth 1 -delete
          mv /tmp/deploy/* /tmp/deploy/.* $GITHUB_WORKSPACE/ 2>/dev/null || true

      - name: Push to Cloudron
        uses: cloudron-io/cloudron-push-to-app@latest
        with:
          CLOUDRON_FQDN: ${{ secrets.CLOUDRON_FQDN }}
          CLOUDRON_TOKEN: ${{ secrets.CLOUDRON_TOKEN }}
          CLOUDRON_APP_ID: ${{ secrets.CLOUDRON_APP_ID }}
          CLOUDRON_PUSH_DESTINATION: "/app/data"
          CLOUDRON_CREATE_APP_BACKUP: "false"
